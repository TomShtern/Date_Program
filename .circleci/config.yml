# CircleCI owns the PostgreSQL-backed integration contract for this repository.
# GitHub Actions handles the fast Maven feedback loop, while this pipeline runs
# the heavier verification that explicitly wires a live PostgreSQL instance.
#
# The repository does not currently check in Maven Wrapper scripts, so both
# jobs use an official Maven + Eclipse Temurin 25 image instead of a JDK-only
# image. That avoids the previous "/bin/bash: mvn: command not found" failure.

version: 2.1

executors:
  java-25-maven-postgres:
    resource_class: medium
    docker:
      - image: maven:3.9.14-eclipse-temurin-25
      - image: postgres:17
        environment:
          POSTGRES_USER: datingapp
          POSTGRES_PASSWORD: datingapp
          POSTGRES_DB: datingapp
    working_directory: ~/project
    environment:
      MAVEN_OPTS: >-
        -Xmx1536m
        -XX:+UseG1GC
        -Dhttps.protocols=TLSv1.2
      MAVEN_CLI_OPTS: >-
        -B
        -Dstyle.color=never
        -Dorg.slf4j.simpleLogger.defaultLogLevel=warn
      DATING_APP_DB_DIALECT: POSTGRESQL
      DATING_APP_DB_URL: jdbc:postgresql://127.0.0.1:5432/datingapp
      DATING_APP_DB_USERNAME: datingapp
      DATING_APP_DB_PASSWORD: datingapp

commands:
  install-ci-packages:
    steps:
      - run:
          name: Install CI helper packages
          max_auto_reruns: 2
          auto_rerun_delay: 15s
          command: |
            apt-get update -qq
            base_packages='postgresql-client xvfb xauth libgl1 libgtk-3-0 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxinerama1 libxrandr2 libxrender1 libxt6 libxtst6 libxxf86vm1'
            if ! DEBIAN_FRONTEND=noninteractive apt-get install -qq -y --no-install-recommends $base_packages libasound2 > /dev/null; then
              DEBIAN_FRONTEND=noninteractive apt-get install -qq -y --no-install-recommends $base_packages libasound2t64 > /dev/null
            fi

  restore-maven-cache:
    steps:
      - restore_cache:
          name: Restore Maven local repository
          keys:
            - v2-maven-deps-{{ checksum "pom.xml" }}
            - v2-maven-deps-

  save-maven-cache:
    steps:
      - save_cache:
          name: Persist Maven local repository
          key: v2-maven-deps-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2/repository

  wait-for-postgresql:
    steps:
      - run:
          name: Wait for PostgreSQL
          command: |
            for i in $(seq 1 30); do
              if pg_isready -h 127.0.0.1 -p 5432 -U datingapp -d datingapp > /dev/null 2>&1; then
                echo "PostgreSQL is ready."
                exit 0
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 2
            done
            echo "PostgreSQL did not become ready in time."
            exit 1

  run-with-heartbeat:
    parameters:
      step_name:
        type: string
      command:
        type: string
      heartbeat_seconds:
        type: integer
        default: 60
    steps:
      - run:
          name: << parameters.step_name >>
          no_output_timeout: 45m
          command: |
            set -eu
            heartbeat() {
              while true; do
                report_suffix=""
                if [ -d target/surefire-reports ]; then
                  report_count=$(find target/surefire-reports -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ')
                  report_suffix=" (surefire-files=${report_count})"
                fi
                echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] << parameters.step_name >> still running${report_suffix}"
                sleep << parameters.heartbeat_seconds >>
              done
            }

            heartbeat &
            heartbeat_pid=$!

            cleanup() {
              kill "$heartbeat_pid" 2>/dev/null || true
              wait "$heartbeat_pid" 2>/dev/null || true
            }

            trap cleanup EXIT
            stdbuf -oL -eL bash -lc '<< parameters.command >>'

jobs:
  postgres-verify:
    executor: java-25-maven-postgres
    steps:
      - checkout
      - restore-maven-cache
      - install-ci-packages
      - wait-for-postgresql

      - run-with-heartbeat:
          step_name: Maven test suite (headless JavaFX)
          command: >-
            timeout 20m
            xvfb-run -a -s "-screen 0 1920x1080x24"
            mvn ${MAVEN_CLI_OPTS}
            -Djava.awt.headless=true
            test
          heartbeat_seconds: 30

      - run-with-heartbeat:
          step_name: Maven verify plugins (skip tests)
          command: mvn ${MAVEN_CLI_OPTS} -DskipTests verify
          heartbeat_seconds: 60

      - save-maven-cache

      - store_test_results:
          path: target/surefire-reports

      - store_artifacts:
          path: target/surefire-reports
          destination: surefire-reports
      - store_artifacts:
          path: target/site/jacoco
          destination: jacoco-report
      - store_artifacts:
          path: target/spotbugsXml.xml
          destination: spotbugs-report.xml

  postgres-runtime-smoke:
    executor: java-25-maven-postgres
    steps:
      - checkout
      - restore-maven-cache
      - install-ci-packages
      - wait-for-postgresql

      - run-with-heartbeat:
          step_name: PostgreSQL smoke test
          command: >-
            mvn ${MAVEN_CLI_OPTS}
            -Dcheckstyle.skip=true
            -Dtest=PostgresqlRuntimeSmokeTest
            -Ddatingapp.pgtest.url=jdbc:postgresql://127.0.0.1:5432/datingapp
            -Ddatingapp.pgtest.username=datingapp
            -Ddatingapp.pgtest.password=datingapp
            test
          heartbeat_seconds: 30

      - save-maven-cache

      - store_test_results:
          path: target/surefire-reports

      - store_artifacts:
          path: target/surefire-reports
          destination: pg-smoke-reports

workflows:
  postgresql-integration:
    jobs:
      - postgres-verify
      - postgres-runtime-smoke:
          requires:
            - postgres-verify
