name: github-fast-feedback

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fast-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # GitHub Actions owns the fast repository-native guardrail:
      # format, compile, unit/integration tests that do not require explicit
      # PostgreSQL runtime wiring. The full PostgreSQL-backed verification path
      # lives in CircleCI.
      - name: Fast Maven feedback
        run: >-
          mvn spotless:check verify
          -B
          -Dorg.slf4j.simpleLogger.defaultLogLevel=warn
