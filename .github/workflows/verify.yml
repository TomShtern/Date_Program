name: github-fast-feedback

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fast-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Linux UI dependencies
        run: |
          sudo apt-get update
          base_packages='xvfb xauth libgl1 libgtk-3-0 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxinerama1 libxrandr2 libxrender1 libxt6 libxtst6 libxxf86vm1'
          if ! sudo DEBIAN_FRONTEND=noninteractive apt-get install -y $base_packages libasound2; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y $base_packages libasound2t64
          fi

      # GitHub Actions owns the fast repository-native guardrail:
      # format, compile, and test feedback that runs quickly on GitHub-hosted
      # runners. CircleCI remains the authoritative full-verification lane with
      # the full verify phase and explicit PostgreSQL-backed integration checks.
      - name: Fast Maven feedback
        run: >-
          xvfb-run -a mvn spotless:check test
          -B
          -Dstyle.color=never
          -Djava.awt.headless=true
          -Dorg.slf4j.simpleLogger.defaultLogLevel=warn
